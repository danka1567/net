name: PrimeSrc Pipeline (Browserbase)

on:
  workflow_dispatch:
    inputs:
      media_type:
        description: "Media type"
        required: false
        default: "movie"
        type: choice
        options: [movie, tv]
      skip_stage1:
        description: "Skip Stage 1 (reuse existing api_url_list.txt)"
        required: false
        default: false
        type: boolean
      skip_stage2:
        description: "Skip Stage 2 (keys only, no browser)"
        required: false
        default: false
        type: boolean

  # Uncomment to run on a schedule:
  # schedule:
  #   - cron: "0 2 * * *"   # 2 AM UTC daily

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install nodriver

      - name: Restore previous pipeline_summary (for merging)
        uses: actions/download-artifact@v4
        with:
          name: pipeline-summary
          path: .
        continue-on-error: true

      - name: Restore api_url_list (if skip-stage1)
        if: ${{ inputs.skip_stage1 == true }}
        uses: actions/download-artifact@v4
        with:
          name: api-url-list
          path: .
        continue-on-error: true

      - name: Run PrimeSrc pipeline
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        run: |
          ARGS="--type ${{ inputs.media_type || 'movie' }}"
          if [ "${{ inputs.skip_stage1 }}" = "true" ]; then
            ARGS="$ARGS --skip-stage1"
          fi
          if [ "${{ inputs.skip_stage2 }}" = "true" ]; then
            ARGS="$ARGS --skip-stage2"
          fi
          echo "Running: python primesrc_pipeline.py $ARGS"
          python primesrc_pipeline.py $ARGS

      - name: Show result summary
        if: always()
        run: |
          echo "=== final_stream_urls.txt ==="
          [ -f final_stream_urls.txt ] && cat final_stream_urls.txt || echo "(not found)"
          echo ""
          echo "=== pipeline_summary.json (first 50 lines) ==="
          [ -f pipeline_summary.json ] && head -50 pipeline_summary.json || echo "(not found)"

      - name: Upload final_stream_urls
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-stream-urls
          path: final_stream_urls.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Upload api_url_list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-url-list
          path: api_url_list.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Upload pipeline_summary (pretty JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary
          path: pipeline_summary.json
          if-no-files-found: warn
          retention-days: 90

      - name: Upload pipeline_summary (compressed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary-gz
          path: pipeline_summary.gz.json
          if-no-files-found: warn
          retention-days: 90
